<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0E7A4D" />
    <title>Perfume بيرفيوم</title>
  </head>
  <body>
    <div id="root">
      <!-- Instant boot splash: static HTML shown on first paint (no JS needed),
           replaced automatically when React mounts. Kills the blank-white wait. -->
      <div id="boot-splash" style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#fafaf9 0%,#f5f5f4 100%);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;padding:24px;">
        <div style="font-size:24px;font-weight:700;letter-spacing:-0.02em;text-align:center;background:linear-gradient(135deg,#0E7A4D,#15A66A);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;">Perfume بيرفيوم</div>
        <div style="margin-top:18px;width:26px;height:26px;border:3px solid #e7e5e4;border-top-color:#0E7A4D;border-radius:50%;animation:bootspin .8s linear infinite;"></div>
        <div style="margin-top:14px;font-size:10px;color:#a8a29e;letter-spacing:.02em;text-align:center;">Waiting has value · للانتظار قيمة</div>
      </div>
      <style>@keyframes bootspin{to{transform:rotate(360deg)}}</style>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
